<!DOCTYPE html>
<html>
<head>

<title>Pro Video Downloader</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#020617;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
margin-top:80px;
}

.box{
background:#1e293b;
width:380px;
margin:auto;
padding:30px;
border-radius:12px;
}

input{
width:90%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.preview{
margin-top:20px;
}

video{
width:90%;
border-radius:10px;
}

footer{
margin-top:60px;
opacity:0.6;
}

</style>

</head>

<body>

<header>
Pro Video Downloader
</header>

<div class="container">

<div class="box">

<h2>Download Video</h2>

<p>Instagram • TikTok • YouTube</p>

<input id="url" placeholder="Paste video link disini">

<br>

<button onclick="preview()">Preview</button>

<div class="preview" id="preview"></div>

</div>

</div>

<footer>
Website by Brut4
</footer>

<script>

function preview(){

let link = document.getElementById("url").value

if(link === ""){
alert("Masukkan link dulu")
return
}

document.getElementById("preview").innerHTML =
"<p>Preview tidak tersedia langsung.<br>Klik tombol download dibawah.</p>" +
"<br><button onclick='download()'>Download Video</button>"

}

function download(){

let link = document.getElementById("url").value

if(link.includes("instagram")){
window.open("https://snapinsta.app/?url=" + link)
}

else if(link.includes("tiktok")){
window.open("https://snaptik.app/?url=" + link)
}

else if(link.includes("youtube")){
window.open("https://yt1s.com/en?q=" + link)
}

else{
alert("Link tidak dikenali")
}

}

</script>

</body>

</html>
