<!DOCTYPE html>
<html>
<head>

<title>Brut4 Hacker Portfolio</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
margin:0;
padding:20px;
}

#boot{
white-space:pre-line;
}

#terminal{
display:none;
border:1px solid #00ff9c;
padding:20px;
margin-top:20px;
border-radius:10px;
}

input{
background:black;
border:none;
color:#00ff9c;
outline:none;
font-family:monospace;
width:90%;
}

.line{
margin:5px 0;
}

</style>

</head>

<body>

<div id="boot"></div>

<div id="terminal">
<div class="line">Brut4 Terminal</div>
<div class="line">type "help"</div>
</div>

<div id="inputArea" style="display:none">
> <input id="cmd" autofocus>
</div>

<script>

const bootText = [
"Booting Brut4 System...",
"Loading modules...",
"Connecting server...",
"Initializing hacker interface...",
"Access granted...",
"Welcome Brut4"
]

let i = 0

function boot(){

if(i < bootText.length){

document.getElementById("boot").innerHTML += bootText[i] + "\n"

i++

setTimeout(boot,700)

}else{

document.getElementById("boot").style.display="none"

document.getElementById("terminal").style.display="block"

document.getElementById("inputArea").style.display="block"

}

}

boot()

const terminal = document.getElementById("terminal")
const input = document.getElementById("cmd")

input.addEventListener("keydown",function(e){

if(e.key === "Enter"){

let command = input.value

let line = document.createElement("div")
line.className="line"
line.textContent="> "+command

terminal.appendChild(line)

let res = document.createElement("div")
res.className="line"

if(command==="help"){
res.textContent="about, skills, projects, contact"
}

else if(command==="about"){
res.textContent="I am Brut4 learning web development."
}

else if(command==="skills"){
res.textContent="HTML, CSS, JavaScript"
}

else if(command==="projects"){
res.textContent="Instagram Downloader Website, Portfolio Website"
}

else if(command==="contact"){
res.innerHTML='Instagram: <a href="https://instagram.com" style="color:#00ff9c">open</a>'
}

else{
res.textContent="command not found"
}

terminal.appendChild(res)

input.value=""

window.scrollTo(0,document.body.scrollHeight)

}

})

</script>

</body>

</html>
